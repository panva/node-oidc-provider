name: Conformance Checks

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'certification/**'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 'certification/**'
  schedule:
    - cron: '55 11 * * 1'
  workflow_dispatch:
    inputs:
      conformance_suite_version:
        description: 'Conformance Suite tag override, e.g. release-v5.1.39 (takes precedence over vars.CONFORMANCE_SUITE_VERSION)'
        required: false
        type: string

jobs:
  suite:
    name: Conformance Suite
    if: ${{ github.repository == 'panva/node-oidc-provider' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Set Conformance Suite Version
        id: version
        env:
          VERSION_OVERRIDE: ${{ inputs.conformance_suite_version || vars.CONFORMANCE_SUITE_VERSION || '' }}
        run: |
          set -o pipefail
          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
            LATEST=$(curl -fsSL https://gitlab.com/api/v4/projects/4175605/releases | jq -r '.[0].tag_name' || true)
          else
            LATEST=$(curl -fsSL https://gitlab.com/api/v4/projects/4175605/releases | jq -r '.[0].tag_name')
            if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
              echo "Could not resolve the latest Conformance Suite release" >&2
              exit 1
            fi
            VERSION="$LATEST"
          fi
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "### Conformance Suite Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$VERSION_OVERRIDE" ]; then
            echo "Version: **$VERSION** (override)" >> $GITHUB_STEP_SUMMARY
            if [ -n "$LATEST" ] && [ "$LATEST" != "null" ] && [ "$VERSION" != "$LATEST" ]; then
              echo "Latest Available: **$LATEST**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "Version: **$VERSION**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Compose: **docker-compose-prebuilt.yml@$VERSION**" >> $GITHUB_STEP_SUMMARY

  run:
    if: ${{ github.repository == 'panva/node-oidc-provider' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs:
      - suite
    env:
      IMAGE_TAG: ${{ needs.suite.outputs.version }}
      SUITE_BASE_URL: https://localhost.emobix.co.uk:8443
      SETUP: ${{ toJSON(matrix.setup) }}
      VERSION: ${{ needs.suite.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        setup:
          # OP Basic
          - plan: oidcc-basic-certification-test-plan

          # OP Hybrid
          - plan: oidcc-hybrid-certification-test-plan

          # OP Implicit
          - plan: oidcc-implicit-certification-test-plan

          # OP Dynamic
          - plan: oidcc-dynamic-certification-test-plan
            response_type: code
          - plan: oidcc-dynamic-certification-test-plan
            response_type: id_token
          - plan: oidcc-dynamic-certification-test-plan
            response_type: id_token token
          - plan: oidcc-dynamic-certification-test-plan
            response_type: code id_token
          - plan: oidcc-dynamic-certification-test-plan
            response_type: code token
          - plan: oidcc-dynamic-certification-test-plan
            response_type: code id_token token

          # RP-Initiated OP
          - plan: oidcc-rp-initiated-logout-certification-test-plan

          # Back-Channel OP
          - plan: oidcc-backchannel-rp-initiated-logout-certification-test-plan

          # FAPI 2.0 Security Profile Final
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: dpop
            openid: openid_connect
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: dpop
            openid: plain_oauth
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: mtls
            openid: openid_connect
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: mtls
            openid: plain_oauth
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: mtls
            sender_constrain: dpop
            openid: openid_connect
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: mtls
            sender_constrain: dpop
            openid: plain_oauth
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: mtls
            sender_constrain: mtls
            openid: openid_connect
          - plan: fapi2-security-profile-final-test-plan
            client_auth_type: mtls
            sender_constrain: mtls
            openid: plain_oauth

          # FAPI 2.0 Message Signing Final
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: dpop
            openid: openid_connect
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: dpop
            openid: plain_oauth
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: mtls
            openid: openid_connect
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: private_key_jwt
            sender_constrain: mtls
            openid: plain_oauth
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: mtls
            sender_constrain: dpop
            openid: openid_connect
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: mtls
            sender_constrain: dpop
            openid: plain_oauth
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: mtls
            sender_constrain: mtls
            openid: openid_connect
          - plan: fapi2-message-signing-final-test-plan
            client_auth_type: mtls
            sender_constrain: mtls
            openid: plain_oauth

          # FAPI 1.0 Advanced (Final)
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: by_value
            client_auth_type: private_key_jwt
            fapi_response_mode: plain_response
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: pushed
            client_auth_type: private_key_jwt
            fapi_response_mode: plain_response
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: by_value
            client_auth_type: private_key_jwt
            fapi_response_mode: jarm
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: pushed
            client_auth_type: private_key_jwt
            fapi_response_mode: jarm
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: by_value
            client_auth_type: mtls
            fapi_response_mode: plain_response
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: pushed
            client_auth_type: mtls
            fapi_response_mode: plain_response
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: by_value
            client_auth_type: mtls
            fapi_response_mode: jarm
          - plan: fapi1-advanced-final-test-plan
            fapi_auth_request_method: pushed
            client_auth_type: mtls
            fapi_response_mode: jarm

          # FAPI RW-CIBA-ID1
          - plan: fapi-ciba-id1-test-plan
            client_auth_type: private_key_jwt
            ciba_mode: poll
          - plan: fapi-ciba-id1-test-plan
            client_auth_type: private_key_jwt
            ciba_mode: ping
          - plan: fapi-ciba-id1-test-plan
            client_auth_type: mtls
            ciba_mode: poll
          - plan: fapi-ciba-id1-test-plan
            client_auth_type: mtls
            ciba_mode: ping

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: 'npm'
      - run: npm clean-install
      - name: Run oidc-provider (OIDC)
        run: |
          set -o pipefail
          node certification/oidc/docker > >(tee server.log) 2>&1 &
          echo "OIDC_PROVIDER_PID=$!" >> $GITHUB_ENV
        if: ${{ startsWith(matrix.setup.plan, 'oidcc') }}
        env:
          PORT: 3000
          DEBUG: oidc-provider:*
          ISSUER: https://172.17.0.1:3000
          NODE_TLS_REJECT_UNAUTHORIZED: 0
      - name: Run oidc-provider (FAPI)
        run: |
          set -o pipefail
          node certification/fapi > >(tee server.log) 2>&1 &
          echo "OIDC_PROVIDER_PID=$!" >> $GITHUB_ENV
        if: ${{ startsWith(matrix.setup.plan, 'fapi') }}
        env:
          ISSUER: https://172.17.0.1:3000
          PORT: 3000
          DEBUG: oidc-provider:*
          NODE_OPTIONS: --tls-cipher-list="ECDHE-RSA-AES128-GCM-SHA256 ECDHE-RSA-AES256-GCM-SHA384 ECDHE-ECDSA-AES128-GCM-SHA256 ECDHE-ECDSA-AES256-GCM-SHA384"
          NODE_TLS_REJECT_UNAUTHORIZED: 0
      - name: Fetch Conformance Suite Compose
        run: |
          mkdir -p conformance-suite
          curl -fsSLo conformance-suite/docker-compose-prebuilt.yml "https://gitlab.com/openid/conformance-suite/-/raw/$VERSION/docker-compose-prebuilt.yml"
          cat > conformance-suite/docker-compose-prebuilt.override.yml <<'YAML'
          services:
            nginx:
              networks:
                default:
                  aliases:
                    - localhost.emobix.co.uk
            server:
              environment:
                SPRING_PROFILES_ACTIVE: "dev"
                JAVA_EXTRA_ARGS: ""
                OIDC_GOOGLE_CLIENTID: ${OIDC_GOOGLE_CLIENTID:-google-client}
                OIDC_GOOGLE_SECRET: ${OIDC_GOOGLE_SECRET:-google-secret}
                OIDC_GITLAB_CLIENTID: ${OIDC_GITLAB_CLIENTID:-gitlab-client}
                OIDC_GITLAB_SECRET: ${OIDC_GITLAB_SECRET:-gitlab-secret}
          YAML
      - name: Run Conformance Suite
        run: |
          compose=(docker compose -f conformance-suite/docker-compose-prebuilt.yml -f conformance-suite/docker-compose-prebuilt.override.yml)
          "${compose[@]}" pull
          "${compose[@]}" up -d

          for attempt in {1..120}; do
            if curl -skfail "$SUITE_BASE_URL/api/runner/available" >/dev/null; then
              exit 0
            fi

            if (( attempt % 10 == 0 )); then
              "${compose[@]}" ps
              "${compose[@]}" logs --tail=80 server nginx
            fi

            sleep 2
          done

          "${compose[@]}" ps
          "${compose[@]}" logs --tail=300
          exit 1
      - name: Adjust configuration files for CI
        run: |
          sed -i -e 's/op.panva.cz/172.17.0.1:3000/g' certification/oidc/plan.json
          sed -i -e 's/mtls.fapi.panva.cz/172.17.0.1:3000/g' certification/fapi/plan.json
          sed -i -e 's/fapi.panva.cz/172.17.0.1:3000/g' certification/fapi/plan.json
      - name: Run the plan
        run: npx mocha --timeout 0 --retries 1 certification/runner
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: 0
      - name: Add server log to artifact
        if: ${{ failure() }}
        run: |
          zip -ur ${{ env.EXPORT_FILE }} server.log
      - name: Upload test artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: export-*.zip
          name: certification html results idx(${{ strategy.job-index }})
          if-no-files-found: ignore
        if: ${{ always() }}
      - name: Stop Conformance Suite
        if: ${{ always() }}
        run: |
          if [ -n "${OIDC_PROVIDER_PID:-}" ]; then
            kill -SIGINT "$OIDC_PROVIDER_PID" || true
          fi
          if [ -f conformance-suite/docker-compose-prebuilt.yml ] && [ -f conformance-suite/docker-compose-prebuilt.override.yml ]; then
            docker compose -f conformance-suite/docker-compose-prebuilt.yml -f conformance-suite/docker-compose-prebuilt.override.yml down --volumes || true
          elif [ -f conformance-suite/docker-compose-prebuilt.yml ]; then
            docker compose -f conformance-suite/docker-compose-prebuilt.yml down --volumes || true
          fi
          sudo rm -rf conformance-suite/mongo
